---
# App 1: Simple nginx with load simulator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: apps
  labels:
    app: app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
      - name: load-simulator
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            while true; do
              dd if=/dev/zero of=/dev/null count=100000 bs=1024
              sleep 0.5
            done
        resources:
          requests:
            cpu: 100m
            memory: 32Mi
          limits:
            cpu: 300m
            memory: 128Mi

